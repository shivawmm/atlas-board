name: Build and Push Docker Image

on:
  push:
    branches:
      - main

    paths-ignore:
      - 'helm/atlas-board/values.yaml'

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Image Tag
        run: |
          echo "IMAGE_TAG=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build -t shivawmm1810/atlas-board:${IMAGE_TAG} .

      - name: Push Docker Image
        run: |
          docker push shivawmm1810/atlas-board:${IMAGE_TAG}

      - name: Update Helm Chart Image Tag
        run: |
          sed -i 's/tag: ".*"/tag: "'"${IMAGE_TAG}"'"/' helm/atlas-board/values.yaml

      - name: Commit Updated Helm Values
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add helm/atlas-board/values.yaml

          git commit -m "Updated image tag to ${IMAGE_TAG}" || echo "No changes to commit"

          git push