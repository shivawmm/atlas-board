<!DOCTYPE html>
<html>
<head>
    <title>Atlas Board</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f4f4f4;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 500px;
        }

        input {
            padding: 10px;
            width: 70%;
        }

        button {
            padding: 10px;
        }

        li {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Atlas Board</h1>

    <form method="POST">
        <input type="text" name="task" placeholder="Enter task" required>
        <button type="submit">Add</button>
    </form>

    <h3>Tasks</h3>

    <ul>
        {% for task in tasks %}
            <li>{{ task }}</li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
